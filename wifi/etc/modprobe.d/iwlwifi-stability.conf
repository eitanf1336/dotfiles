# Intel AX201 stability.
# disable_11ax=1 works around a firmware watchdog crash (NMI_INTERRUPT_WDG /
# NMI_INTERRUPT_LMAC_FATAL) on HE links to multi-BSSID APs. Costs 11ax rates,
# keeps 11ac (~866 Mbps).
options iwlmvm power_scheme=1
options iwlwifi power_save=0 uapsd_disable=1 disable_11ax=1
options cfg80211 ieee80211_regdom=IL
