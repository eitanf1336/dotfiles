# Keep the dGPU out of D3cold (runtime power-off).
#
# 2026-07-20: after ~3h idle the GPU was runtime-suspended; waking it failed with
#   GSP task watchdog timeout @ pc:0x100cd12, partition:2#0, task:3
#   NVRM: Xid 119, Timeout after 9s waiting for RPC response from GPU0 GSP!
#         Expected function 4097 (GSP_INIT_DONE)
#   NVRM: Xid 154, GPU recovery action changed from None to GPU Reset Required
# Stack was nv_pmops_runtime_resume -> pci_pm_runtime_resume, i.e. the failure is
# specifically resume-from-D3cold. gnome-shell then segfaulted in
# libnvidia-eglcore and the console filled with "Error while waiting for GPU
# progress" until a hard reboot.
#
# 0x00 disables dynamic power management entirely, so that resume path is never
# taken. Costs a few watts at idle on battery. Driver 595.71.05, RTX 4060 Laptop.
options nvidia NVreg_DynamicPowerManagement=0x00
