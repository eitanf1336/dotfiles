# zram is RAM-backed and fast: bias toward it, and read one page at a time
vm.swappiness=180
vm.page-cluster=0
# Keep a bigger free-memory buffer so kswapd reclaims EARLY, before a burst
# allocation hits the OOM wall (this is what was killing Chrome tabs under load)
vm.watermark_scale_factor=200
vm.min_free_kbytes=200000
