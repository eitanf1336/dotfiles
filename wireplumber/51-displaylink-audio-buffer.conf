# DisplayLink DL6950 dock: video (usbfs) and audio (snd-usb-audio) are the same
# USB device (17e9:6000) sharing one link. DisplayLinkManager's framebuffer
# bursts starve the isochronous audio endpoints, causing dropouts.
# Give the sink a deeper ALSA buffer + headroom to ride out those bursts.
monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output.usb-DisplayLink.*" }
    ]
    actions = {
      update-props = {
        api.alsa.period-size   = 1024
        api.alsa.periods       = 4
        api.alsa.headroom      = 8192
        api.alsa.disable-batch = true
        node.latency           = "2048/48000"
      }
    }
  }
]
