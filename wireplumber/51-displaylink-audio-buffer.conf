# DisplayLink DL6950 dock: video (usbfs) and audio (snd-usb-audio) are the same
# USB device (17e9:6000) sharing one link. DisplayLinkManager's framebuffer
# bursts starve the isochronous audio endpoints, causing dropouts.
#
# What rides out a burst is how much audio sits queued in the device, which is
# roughly quantum + headroom -- and that same number IS the output delay, so
# protection and latency trade off 1:1. ~256ms here: inaudible for music, but
# it puts audio behind video and adds visible lag to pause/volume. These dock
# speakers are a music-first output; that is the accepted trade.
#
# Do NOT bother raising period-size: the DL6950 refuses it and negotiates 512
# regardless. The ring is not the constraint -- PipeWire picks period-num = 64,
# giving buffer_size = 32768 frames (~683ms), so headroom is never clamped.
# Verify with: cat /proc/asound/card1/pcm0p/sub0/hw_params (while playing).
#
# api.alsa.disable-batch is deliberately NOT set: USB audio is a batch device
# and PipeWire grants batch devices an extra period of headroom automatically
# (visible as headroom + 512). Disabling batch throws that free margin away.
monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output.usb-DisplayLink.*" }
    ]
    actions = {
      update-props = {
        api.alsa.headroom = 12288
        # Deliberately 2048, not higher: PipeWire's default.clock.max-quantum
        # is 2048, so a larger value here is silently clamped and only makes
        # the config lie about the real ride-out. Headroom is the lever that
        # actually moves, and unlike max-quantum it is scoped to this device.
        node.latency      = "2048/48000"
      }
    }
  }
]
